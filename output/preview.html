<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>订单详情</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="phone">
    <section class="header">
      <div class="status-bar">
        <span class="time">9:41</span>
        <span class="system-icons">▮▮▮  Wi‑Fi  ▭</span>
      </div>

      <div class="nav">
        <span class="back">‹</span>
        <h1>订单详情</h1>
        <div class="capsule">
          <span>•••</span>
          <span class="capsule-divider"></span>
          <span class="circle"></span>
        </div>
      </div>

      <div class="summary">
        <div class="amount">￥283.8</div>
        <div class="status">已加油</div>
      </div>
    </section>

    <section class="content">
      <section class="card station-card">
        <div class="station-top">
          <div class="station-image"></div>
          <div class="station-text">
            <h2>品牌优选广州大道加油站</h2>
            <p>广州市海珠区新港西路103号天府路中海...</p>
          </div>
        </div>

        <div class="divider"></div>

        <div class="detail-row">
          <span>油品型号</span>
          <strong>95#</strong>
        </div>
        <div class="detail-row">
          <span>加油枪号</span>
          <strong>3号</strong>
        </div>
        <div class="detail-row">
          <span>加油升数</span>
          <strong>34.5L</strong>
        </div>
      </section>

      <section class="card fee-card">
        <div class="fee-row">
          <span>加油金额</span>
          <strong>￥200</strong>
        </div>
        <div class="fee-row">
          <span>会员费</span>
          <strong>￥99</strong>
        </div>
        <div class="fee-row">
          <span>服务费</span>
          <strong>￥1.52</strong>
        </div>
        <div class="fee-row">
          <span>ETC立减</span>
          <strong class="discount">-￥6.72</strong>
        </div>
        <div class="fee-row">
          <span>优惠券抵扣</span>
          <strong class="discount">-￥10</strong>
        </div>
        <div class="fee-row">
          <span>会员加油券</span>
          <span class="right-group">
            <em class="tag">会员优惠</em>
            <strong class="discount">-￥10</strong>
          </span>
        </div>

        <div class="divider"></div>

        <div class="pay-row">
          <span>实际支付</span>
          <strong>￥283.8</strong>
        </div>
      </section>

      <section class="card order-card">
        <div class="detail-row">
          <span>订单编号</span>
          <strong>129381792837981</strong>
        </div>
      </section>
    </section>

    <footer class="bottom-bar">
      <div class="feedback">
        <span>加油遇到问题</span><a href="#">点击反馈</a><span class="edit-icon">✎</span>
      </div>
      <button>查看会员</button>
      <div class="home-indicator"></div>
    </footer>
  </main>
</body>
</html>
